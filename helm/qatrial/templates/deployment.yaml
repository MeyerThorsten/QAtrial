apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qatrial.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "qatrial.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "qatrial.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "qatrial.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              {{- if .Values.postgresql.enabled }}
              value: "postgresql://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "qatrial.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "qatrial.fullname" . }}-secret
                  key: DATABASE_URL
              {{- end }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "qatrial.fullname" . }}-secret
                  key: JWT_SECRET
            - name: AI_PROVIDER_TYPE
              value: {{ .Values.env.AI_PROVIDER_TYPE | quote }}
            - name: AI_PROVIDER_URL
              value: {{ .Values.env.AI_PROVIDER_URL | quote }}
            - name: AI_PROVIDER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "qatrial.fullname" . }}-secret
                  key: AI_PROVIDER_KEY
                  optional: true
            - name: AI_PROVIDER_MODEL
              value: {{ .Values.env.AI_PROVIDER_MODEL | quote }}
            - name: SSO_ENABLED
              value: {{ .Values.env.SSO_ENABLED | quote }}
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.uploads.enabled }}
            - name: uploads
              mountPath: /app/uploads
            {{- end }}
      volumes:
        {{- if .Values.persistence.uploads.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "qatrial.fullname" . }}-uploads
        {{- end }}
