replicaCount: 1

image:
  repository: ghcr.io/meyerthorsten/qatrial
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3001

ingress:
  enabled: false
  className: nginx
  hosts:
    - host: qatrial.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: qatrial-tls
  #    hosts:
  #      - qatrial.example.com

postgresql:
  enabled: true
  auth:
    database: qatrial
    username: qatrial
    password: changeme

env:
  JWT_SECRET: change-this-in-production
  AI_PROVIDER_TYPE: ""
  AI_PROVIDER_URL: ""
  AI_PROVIDER_KEY: ""
  AI_PROVIDER_MODEL: ""
  SSO_ENABLED: "false"

persistence:
  uploads:
    enabled: true
    size: 10Gi
    storageClass: ""

resources:
  limits:
    memory: 512Mi
  requests:
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
